    <!DOCTYPE html>
    <head>
        <title>Registro Elettronico</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: Arial, sans-serif;
            }

            body {
                height: 100vh;
                background: linear-gradient(to bottom, rgba(161, 150, 165, 0.7), rgba(113, 49, 131, 0.5)), url("file:///C:/Users/ITS%20Informatica/Desktop/algoritmi/casa/Sign%20In/Sign%20In/ITS%20smart%20(1).png");
                background-size: cover;
                background-position: center bottom;
                background-repeat: no-repeat;
                background-attachment: fixed; 
                display: flex;
                justify-content:end ; 
                align-items: center; 
                padding-right: 10%; 
            }

            .login-box {
                position: relative;
                right: 200px;
                background: rgba(0, 3, 12, 0.1);
                padding: 20px;
                border-radius: 10px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
                width: 300px;
                backdrop-filter: blur(10px); 
                box-shadow: 0 4px 15px rgba(218, 218, 218, 0.4);  
                bottom:50px;
            }

            .login-box h2 {
                text-align: center;
                color: white;
                margin-bottom: 20px;
            }

            .login-box label {
                color: white;
                display: block;
                margin-bottom: 5px;
                font-weight: bold;
            }

            .login-box input {
                width: 100%;
                padding: 10px;
                margin-bottom: 15px;
                border: none;
                border-radius: 5px;
                font-size: 16px;
            }

            .login-box button {
                width: 100%;
                padding: 10px;
                border: none;
                border-radius: 5px;
                background: #007bff;
                color: white;
                font-size: 16px;
                cursor: pointer;
                transition: 0.3s;
            }

            .login-box button:hover {
                background: #0056b3;
            }
    
       
        </style>
    </head>
    <body>


        <div class="login-box">
            <h2>Sign In</h2>
            <form>
            
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Inserisci email" required>
                
                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="Inserisci password" required>
                
                <button type="submit">Sign In</button>
            </form>
        </div>

    </body>
    </html>
